spring.application.name=growmeal

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/growmeal
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=munhuiwon
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=growmeal-secret-key-must-be-at-least-64-bytes-long-for-hs512-algorithm-security
jwt.expiration=3600000
jwt.refresh-expiration=604800000

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Phone Verification
phone.verification.expiration-minutes=3
